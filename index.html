<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>福應山 佛國寺</title>

  <!-- AOS for repeated scroll fade -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap" rel="stylesheet">
</head>
<body>

 <div id="header-placeholder"></div>


  <!-- Hero -->
  <section class="hero" style="background-image: url('images/hero.webp');background-size: 108%;background-position: 3% 53%">
    <div class="hero-overlay"></div>
    <div class="hero-text">
      <!-- data-aos makes the title fade every time you scroll into view (AOS configured in script.js) -->
      <h1 data-aos="fade" data-aos-duration="3000">福應山　佛國寺</h1>
    </div>
  </section>

<main class="page-content intro-page">

  <!-- Introduction courte -->
  <section class="intro-message" data-aos="fade-up" data-aos-duration="1200">
    <p>
      福應山佛國寺は、曹洞宗の教えにもとづき、<br>
      坐禅・作務・勤行を通して、静かに自己を見つめる修行道場です。<br>
      日々の生活そのものを仏道として大切にしています。
    </p>
  </section>

  <!-- Mosaïque -->
  <section class="intro-grid">

    <a href="history.html" class="intro-card" data-aos="fade-up">
      <img src="images/menu-history.jpg" alt="歴史">
      <div class="intro-overlay">
        <h2>歴史と由緒</h2>
        <p>寺の歩みと伝統</p>
      </div>
    </a>

    <a href="practice.html" class="intro-card" data-aos="fade-up" data-aos-delay="80">
      <img src="images/menu-practice.jpg" alt="修行">
      <div class="intro-overlay">
        <h2>修行</h2>
        <p>坐禅・作務・応量器</p>
      </div>
    </a>

    <a href="sesshin.html" class="intro-card" data-aos="fade-up" data-aos-delay="160">
      <img src="images/menu-sesshin.jpg" alt="接心">
      <div class="intro-overlay">
        <h2>接心</h2>
        <p>集中修行について</p>
      </div>
    </a>

    <a href="schedule.html" class="intro-card" data-aos="fade-up">
      <img src="images/menu-schedule.jpg" alt="行事">
      <div class="intro-overlay">
        <h2>年間行事</h2>
        <p>法要・坐禅会・催し</p>
      </div>
    </a>

    <a href="faq.html" class="intro-card" data-aos="fade-up" data-aos-delay="80">
      <img src="images/menu-faq.jpg" alt="FAQ">
      <div class="intro-overlay">
        <h2>FAQ</h2>
        <p>よくあるご質問</p>
      </div>
    </a>

    <a href="contact.html" class="intro-card" data-aos="fade-up" data-aos-delay="160">
      <img src="images/menu-contact.jpg" alt="お問い合わせ">
      <div class="intro-overlay">
        <h2>お問い合わせ</h2>
        <p>参加・見学について</p>
      </div>
    </a>

  </section>

</main>

  <!-- AOS JS -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <!-- Your script -->
  <script src="script.js"></script>
</body>
</html>
